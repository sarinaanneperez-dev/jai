name: build & release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: write   # required for creating releases

jobs:
  # ----------------------------------------------------------------------
  # Native builds (Linux and macOS)
  # ----------------------------------------------------------------------
  build-native:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C Release

      - name: Rename binary
        run: mv build/jaishi build/jaishi-${{ matrix.os }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: jaishi-${{ matrix.os }}
          path: build/jaishi-${{ matrix.os }}

  # ----------------------------------------------------------------------
  # Android builds (arm64-v8a and armeabi-v7a)
  # ----------------------------------------------------------------------
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a]
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
          unzip android-ndk-r26b-linux.zip
          echo "ANDROID_NDK=$PWD/android-ndk-r26b" >> $GITHUB_ENV

      - name: Configure CMake for Android
        run: |
          cmake -B build -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=${{ matrix.abi }} \
                -DANDROID_PLATFORM=android-24 \
                -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j

      - name: Rename binary
        run: mv build/jaishi build/jaishi-android-${{ matrix.abi }}

      - name: Upload Android binary
        uses: actions/upload-artifact@v4
        with:
          name: jaishi-android-${{ matrix.abi }}
          path: build/jaishi-android-${{ matrix.abi }}

  # ----------------------------------------------------------------------
  # Release – runs only when a tag is pushed
  # ----------------------------------------------------------------------
  release:
    needs: [build-native, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts (debug)
        run: find artifacts -type f

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
